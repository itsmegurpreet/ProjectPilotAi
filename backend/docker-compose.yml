version: "3.9"

services:
  api:
    build: .
    container_name: projectpilot-ai-backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: file:./projectpilot.db
      NODE_ENV: production
      PORT: 4000
      JWT_ACCESS_SECRET: change-this-access-secret-please
      JWT_REFRESH_SECRET: change-this-refresh-secret-please
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AI_PROVIDER: mock
      AI_API_KEY: ""
      AI_BASE_URL: ""
      AI_MODEL: gpt-4o-mini
      MAX_FILE_SIZE_MB: 10
    volumes:
      - ./uploads:/app/uploads
      - ./projectpilot.db:/app/projectpilot.db
